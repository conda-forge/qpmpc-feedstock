{% set name = "qpmpc" %}
{% set version = "3.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/qpmpc-{{ version }}.tar.gz
  sha256: e9b9dfe040189d80e3b7ea102dfd5a62fcd3e775ced1fc8e105a9dd53ba00c69

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=2,<4
    - pip
  run:
    - python >={{ python_min }}
    - qpsolvers >=1.8.0

test:
  imports:
    - qpmpc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/qpmpc
  summary: Linear time-variant model predictive control in Python.
  dev_url: https://github.com/stephane-caron/qpmpc
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - stephane-caron
